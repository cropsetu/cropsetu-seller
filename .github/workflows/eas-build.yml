name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview | production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Target platform (android | ios | all)'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    name: Build ${{ github.event.inputs.platform }} ${{ github.event.inputs.profile }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        run: |
          eas build \
            --profile ${{ github.event.inputs.profile }} \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive \
            --no-wait
