name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-bundle:
    name: Install + bundle check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Metro bundle check (Android)
        run: |
          npx expo export --platform android --output-dir /tmp/expo-export || \
            echo "::warning::Metro bundle check failed — check the log above"

      - name: Check for leaked secrets
        run: |
          if grep -rEn "sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|AIza[A-Za-z0-9_-]{20,}" src/ App.js 2>/dev/null; then
            echo "::error::Possible API key leaked in source — please remove."
            exit 1
          fi
